name: Build and Deploy

on:
  push:
    branches:
      - main
      - feature/portal-modernization-v2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 🛠️ Sanitize Build (Anti-Error)
        run: |
          # Verifica se a pasta existe antes de tentar renomear
          if [ -d "./out/_next" ]; then
            mv ./out/_next ./out/static_next
            echo "Pasta _next renomeada com sucesso."
          else
            echo "Pasta _next não encontrada, ignorando renomeação."
          fi
          
          # Substitui referências. O '|| true' garante que o script não pare se não houver o que substituir
          grep -rl '_next' ./out | xargs sed -i 's/_next/static_next/g' || true
          echo "Substituições de texto concluídas."

      - name: 📦 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          debug 3;
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set ftp:passive-mode true;
          set net:timeout 30;
          set net:max-retries 20;
          set net:reconnect-interval-base 5;
          open $FTP_SERVER;
          user $FTP_USERNAME $FTP_PASSWORD;
          # O comando --no-perms é essencial para a Hostinger
          mirror --reverse --delete --parallel=1 --no-perms --only-newer ./out/ ./;
          bye
          "
