name: Build and Deploy

on:
  push:
    branches:
      - main
      - feature/portal-modernization-v2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 🛠️ Sanitize Build (Rename _next to static_next)
        run: |
          mv ./out/_next ./out/static_next
          find ./out -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "*.css" \) -exec sed -i 's/_next/static_next/g' {} +

      - name: 📦 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set ftp:use-mdtm yes;
          set net:max-retries 3;
          open $FTP_SERVER;
          user $FTP_USERNAME $FTP_PASSWORD;
          mirror --reverse --delete --parallel=5 --no-perms ./out/ ./;
          bye
          "
