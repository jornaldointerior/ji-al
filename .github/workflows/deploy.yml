name: Build and Deploy

on:
  push:
    branches:
      - main
      - feature/portal-modernization-v2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 🛠️ Sanitize Build (Deep Fix)
        run: |
          # 1. Renomeia a pasta de recursos do Next.js
          mv ./out/_next ./out/static_next
          
          # 2. Substitui TODAS as referências nos ficheiros HTML e JS
          # Isso garante que o navegador saiba que agora deve procurar em static_next
          grep -rl '_next' ./out | xargs sed -i 's/_next/static_next/g'

      - name: 📦 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set ftp:passive-mode true;
          set ftp:list-empty-ok yes;
          set net:timeout 15;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          open $FTP_SERVER;
          user $FTP_USERNAME $FTP_PASSWORD;
          # O mirror --reverse envia a pasta 'out' para a raiz do FTP
          # Reduzido --parallel para 2 para evitar bloqueios na Hostinger
          mirror --reverse --delete --parallel=2 ./out/ ./;
          bye
          "
